---
interface:
  display_name: "LLM Wiki Capture"
  short_description: >
    User-invoked capture, review, or source ingest into a maintained LLM wiki
    or knowledge base.
  default_prompt: >
    Use $llm-wiki-capture to capture reusable knowledge from the current
    session, review candidates, or ingest provided source links into a
    maintained LLM wiki or knowledge base.
policy:
  allow_implicit_invocation: false
